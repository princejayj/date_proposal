<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Will You Go On A Date With Me?</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    font-family: Arial, sans-serif;
    text-align: center;
    overflow: hidden;
}

.card {
    background: white;
    padding: 40px;
    border-radius: 25px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    max-width: 400px;
}

h1 {
    color: #e91e63;
}

p {
    font-size: 18px;
}

button {
    padding: 12px 25px;
    margin: 10px;
    border: none;
    border-radius: 25px;
    font-size: 18px;
    cursor: pointer;
}

.yes {
    background: #e91e63;
    color: white;
}

.no {
    background: #ddd;
}

#message {
    display: none;
    color: #e91e63;
    font-size: 22px;
    margin-top: 20px;
}

.heart {
    position: absolute;
    color: red;
    animation: fall 5s linear infinite;
}

@keyframes fall {
    from {
        transform: translateY(-100px);
    }
    to {
        transform: translateY(100vh);
    }
}
</style>
</head>

<body>

<div class="card">
    <h1>❤️ Will You Go On A Date With Me? ❤️</h1>

    <p>
        I would love to spend some special time with you.
        Would you make me happy and say yes?
    </p>

    <button class="yes" onclick="sayYes()">Yes 💕</button>
    <button class="no" onclick="sayNo()">Maybe Later 😊</button>

    <div id="message"></div>
</div>


<script>
function sayYes() {
    document.getElementById("message").style.display = "block";
    document.getElementById("message").innerHTML =
    "🎉 Yay! I can't wait! ❤️<br><br>Date: ___________<br>Time: ___________<br>Place: ___________";
    
    for(let i=0; i<30; i++){
        let heart=document.createElement("div");
        heart.className="heart";
        heart.innerHTML="❤️";
        heart.style.left=Math.random()*100+"vw";
        heart.style.animationDuration=(2+Math.random()*3)+"s";
        document.body.appendChild(heart);
    }
}

function sayNo() {
    document.getElementById("message").style.display = "block";
    document.getElementById("message").innerHTML =
    "No worries 😊 I will still smile today.";
}
</script>

</body>
</html>
